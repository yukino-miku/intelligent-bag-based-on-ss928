name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install lightweight test dependencies
        run: python -m pip install --disable-pip-version-check numpy opencv-python-headless
      - name: Compile Python
        run: python -m compileall -q .
      - name: Python unit tests
        run: python -m unittest discover -v
      - name: Parse tracked JSON
        run: |
          python - <<'PY'
          import json, subprocess
          for path in subprocess.check_output(["git", "ls-files", "*.json"], text=True).splitlines():
              with open(path, encoding="utf-8") as handle:
                  json.load(handle)
              print(path)
          PY
      - name: JavaScript tests
        run: find 06_software/mobile/ssminiprogram/tests -name '*.test.js' -print -exec node {} \;
      - name: Shell syntax
        run: find 05_firmware 06_software 09_deliverables -type f -name '*.sh' -print0 | xargs -0 -r -n1 sh -n
      - name: Repository policy
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -n "$PR_BASE_SHA" ]; then
            git diff --check "$PR_BASE_SHA" HEAD
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi
          python - <<'PY'
          import os, subprocess, sys
          files = subprocess.check_output(["git", "ls-files", "-z"]).split(b"\0")
          forbidden_roots = (b"08_media/", b"10_archive/")
          forbidden_suffixes = (
              b".pt", b".om", b".whl", b".mp4", b".avi",
              b".zip", b".tar", b".tgz", b".7z",
          )
          errors = []
          for raw in filter(None, files):
              path = os.fsdecode(raw)
              if raw.startswith(forbidden_roots):
                  errors.append("forbidden tracked path: " + path)
              if raw.lower().endswith(forbidden_suffixes):
                  errors.append("forbidden binary artifact: " + path)
              if os.path.getsize(path) > 10 * 1024 * 1024:
                  errors.append("tracked file exceeds 10 MiB: " + path)
          if errors:
              print("\n".join(errors), file=sys.stderr)
              raise SystemExit(1)
          PY
